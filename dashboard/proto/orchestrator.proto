syntax = "proto3";

package orchestrator;

import "email.proto";

option go_package = "./;pb";

message RequestAccountRequest {
  // Optional filters or tags
}

message RequestAccountResponse {
  string job_id = 1;
  string session_token = 2;
  bool plus_trial_eligible = 3;
  string error_message = 4;
  string checkout_url = 5;
  string access_token = 6;
}

message RegisterAccountRequest {
  string email = 1;
  string password = 2;
  reserved 3, 4, 5;
  reserved "first_name", "last_name", "dob";
  string account_id = 6;
}

message RegisterAccountResponse {
  string job_id = 1;
  string session_token = 2;
  bool plus_trial_eligible = 3;
  string error_message = 4;
  string checkout_url = 5;
  string access_token = 6;
}

message ActivateAccountRequest {
  // Existing registration job_id used to resolve account_id.
  // The response returns a new activation job_id.
  string job_id = 1;
  reserved 2, 3, 4, 5, 6, 7, 8;
  string account_id = 9;
}

message ActivateAccountResponse {
  string job_id = 1;
  bool success = 2;
  string error_message = 3;
  string charge_ref = 4;
  string snap_token = 5;
}

message LoginAccountRequest {
  string account_id = 1;
}

message LoginAccountResponse {
  string job_id = 1;
  bool started = 2;
  string error_message = 3;
}

message ProbeAccountRequest {
  string account_id = 1;
}

message ProbeAccountResponse {
  string job_id = 1;
  bool started = 2;
  string error_message = 3;
}

message GoPayCycleRequest {}

message GoPayCycleResponse {
  string job_id = 1;
  bool started = 2;
  string error_message = 3;
}

message RegisterAndActivateAccountRequest {
  reserved 1, 2, 3, 4, 5, 8, 9, 10;
  string email = 6;
  string password = 7;
  string account_id = 11;
}

message RegisterAndActivateAccountResponse {
  string job_id = 1;
  string session_token = 2;
  bool plus_trial_eligible = 3;
  string checkout_url = 4;
  bool activation_success = 5;
  string error_message = 6;
  string charge_ref = 7;
  string snap_token = 8;
  string access_token = 9;
}

message JobStep {
  string step_name = 1;
  string status = 2;
  bool recoverable = 3;
  bool retryable = 4;
  string error_message = 5;
  string result_json = 6;
  int64 started_at = 7;
  int64 completed_at = 8;
}

message Job {
  string job_id = 1;
  string account_id = 2;
  string action = 3;
  string status = 4;
  bool recoverable = 5;
  bool retryable = 6;
  string last_step = 7;
  string error_message = 8;
  string result_json = 9;
  int64 created_at = 10;
  int64 updated_at = 11;
  repeated JobStep steps = 12;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  Job job = 1;
  string error_message = 2;
}

message RegisterMailboxRequest {
  bool import_only = 1;
}

message RegisterMailboxResponse {
  string job_id = 1;
  bool success = 2;
  int32 exit_code = 3;
  string error_message = 4;
  repeated RegisteredMailbox mailboxes = 5;
}

message RegisteredMailbox {
  string email_address = 1;
  string password = 2;
  string refresh_token = 3;
  string access_token = 4;
  string status = 5;
}

message StartMailboxOAuthRequest {
  string email_address = 1;
  bool only_missing = 2;
  int32 limit = 3;
}

message StartMailboxOAuthResponse {
  string job_id = 1;
  bool started = 2;
  string error_message = 3;
}

message SubmitRegistrationOtpRequest {
  string job_id = 1;
  string account_id = 2;
  string otp = 3;
}

message SubmitRegistrationOtpResponse {
  bool success = 1;
  string job_id = 2;
  string error_message = 3;
}

message SubmitPaymentConfirmationRequest {
  string job_id = 1;
  string account_id = 2;
}

message SubmitPaymentConfirmationResponse {
  bool success = 1;
  string job_id = 2;
  string error_message = 3;
}

message FetchMailboxInboxesRequest {
  int32 limit_per_mailbox = 1;
  int32 max_mailboxes = 2;
  string email_address = 3;
}

message MailboxBanDetection {
  string account_id = 1;
  string email_address = 2;
  string mailbox_email = 3;
  string from_address = 4;
  string subject = 5;
  int64 received_at_unix = 6;
  bool account_updated = 7;
  string error_message = 8;
}

message FetchMailboxInboxesResponse {
  repeated email.FetchMailboxInboxResult results = 1;
  int32 mailbox_count = 2;
  int32 fetched_count = 3;
  int32 failed_count = 4;
  int32 message_count = 5;
  repeated MailboxBanDetection bans = 6;
  int32 ban_count = 7;
}

service OrchestratorService {
  rpc RegisterAccount(RegisterAccountRequest) returns (RegisterAccountResponse);
  rpc ActivateAccount(ActivateAccountRequest) returns (ActivateAccountResponse);
  rpc AutopayAccount(ActivateAccountRequest) returns (ActivateAccountResponse);
  rpc LoginAccount(LoginAccountRequest) returns (LoginAccountResponse);
  rpc ProbeAccount(ProbeAccountRequest) returns (ProbeAccountResponse);
  rpc RunGoPayCycle(GoPayCycleRequest) returns (GoPayCycleResponse);
  rpc RegisterAndActivateAccount(RegisterAndActivateAccountRequest) returns (RegisterAndActivateAccountResponse);
  rpc RegisterMailbox(RegisterMailboxRequest) returns (RegisterMailboxResponse);
  rpc RunMailboxOAuth(StartMailboxOAuthRequest) returns (StartMailboxOAuthResponse);
  rpc FetchMailboxInboxes(FetchMailboxInboxesRequest) returns (FetchMailboxInboxesResponse);
  rpc SubmitRegistrationOtp(SubmitRegistrationOtpRequest) returns (SubmitRegistrationOtpResponse);
  rpc SubmitPaymentConfirmation(SubmitPaymentConfirmationRequest) returns (SubmitPaymentConfirmationResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);

  // Deprecated: use RegisterAccount.
  rpc RequestAccount(RequestAccountRequest) returns (RequestAccountResponse);
}
