syntax = "proto3";
package maildns;
option go_package = "cloudflare-mail-dns/pb";

service MailDNS {
  // 子域名 CRUD
  rpc AddSubdomain(AddSubdomainRequest) returns (SubdomainResponse);
  rpc RemoveSubdomain(RemoveSubdomainRequest) returns (SubdomainResponse);
  rpc ListSubdomains(ListSubdomainsRequest) returns (ListSubdomainsResponse);

  // 声明式同步：将 config 中的 desired state 同步到 Cloudflare
  rpc Sync(SyncRequest) returns (SyncResponse);

  // 查看 Cloudflare 实际状态
  rpc Status(StatusRequest) returns (StatusResponse);
}

message AddSubdomainRequest {
  string name = 1;  // 子域名前缀, e.g. "mail", "dev"
}

message RemoveSubdomainRequest {
  string name = 1;
}

message SubdomainResponse {
  bool ok = 1;
  string message = 2;
}

message ListSubdomainsRequest {}

message ListSubdomainsResponse {
  repeated SubdomainInfo subdomains = 1;
}

message SubdomainInfo {
  string name = 1;           // 子域名前缀
  string full_domain = 2;    // 完整域名 e.g. "mail.example.com"
  bool dns_configured = 3;   // MX/SPF 记录是否已配置
}

message SyncRequest {}

message SyncResponse {
  int32 dns_created = 1;
  int32 dns_deleted = 2;
  bool catch_all_updated = 3;
  repeated string errors = 4;
}

message StatusRequest {}

message StatusResponse {
  string zone_name = 1;
  string worker_name = 2;
  bool catch_all_enabled = 3;
  repeated SubdomainInfo subdomains = 4;
}
